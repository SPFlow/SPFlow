name: Publish Python Package

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      testpypi_project_name:
        description: "Distribution name to publish to TestPyPI for rehearsal runs"
        default: "spflow"
        required: true
        type: string

concurrency:
  group: publish-${{ github.event.release.tag_name || github.ref_name }}
  cancel-in-progress: false

jobs:
  build-release-dists:
    name: Build Release Distributions
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SPFLOW_DIST_NAME: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.testpypi_project_name || 'spflow' }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install packaging tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Override distribution name for TestPyPI rehearsal
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.testpypi_project_name != 'spflow' }}
        run: |
          python - <<'PY'
          from pathlib import Path

          pyproject = Path("pyproject.toml")
          old = 'name = "spflow"'
          new = f'name = "{__import__("os").environ["SPFLOW_DIST_NAME"]}"'
          content = pyproject.read_text()
          if old not in content:
              raise SystemExit(f"Expected to find {old!r} in pyproject.toml")
          pyproject.write_text(content.replace(old, new, 1))
          PY

      - name: Build distribution artifacts
        run: python -m build

      - name: Check distribution metadata
        run: twine check dist/*

      - name: Validate wheel contents
        run: |
          python - <<'PY'
          import pathlib
          import zipfile

          wheel_path = next(pathlib.Path("dist").glob("*.whl"))
          with zipfile.ZipFile(wheel_path) as wheel:
              names = set(wheel.namelist())

          expected = "spflow/py.typed"
          if expected not in names:
              raise SystemExit(f"Missing required typing marker: {expected}")

          forbidden_prefixes = ("tests/", "docs/", "scripts/")
          leaked = sorted(name for name in names if name.startswith(forbidden_prefixes))
          if leaked:
              leaked_preview = ", ".join(leaked[:10])
              raise SystemExit(f"Unexpected files in wheel: {leaked_preview}")
          PY

      - name: Smoke install built wheel
        run: |
          python -m venv .pkg-smoke
          . .pkg-smoke/bin/activate
          python -m pip install --upgrade pip
          python -m pip install --no-deps dist/*.whl
          python - <<'PY'
          import importlib.metadata
          import os
          import spflow

          version = importlib.metadata.version(os.environ["SPFLOW_DIST_NAME"])
          assert version == spflow.__version__, (version, spflow.__version__)
          print(version)
          PY

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error

  publish-testpypi:
    name: Publish to TestPyPI
    if: ${{ github.event_name == 'workflow_dispatch' }}
    needs: build-release-dists
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: testpypi
      url: ${{ format('https://test.pypi.org/project/{0}/', github.event.inputs.testpypi_project_name || 'spflow') }}
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/

  publish-pypi:
    name: Publish to PyPI
    if: ${{ github.event_name == 'release' }}
    needs: build-release-dists
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/project/spflow/
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
